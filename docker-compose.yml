services:

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    image: monitoring-backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - monitoring-network


  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    env_file:
      - .env
    image: monitoring-frontend
    networks:
      - monitoring-network


  postgres:
    image: postgres
    environment: 
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: 
      - postgres-data:/var/lib/postgresql/
    env_file:
      - .env
    networks:
      - monitoring-network


  nginx:
    image: nginx:alpine
    ports:
      - 8081:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - monitoring-network



volumes:
  postgres-data:


networks: 
  monitoring-network:
    driver: bridge



